<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Withdraw GRupiah</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;600;800;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .receipt-container {
            width: 480px;
            background: #fff;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Zigzag top and bottom */
        .receipt-container::before,
        .receipt-container::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            height: 10px;
            background-size: 20px 20px;
        }

        .receipt-container::before {
            top: -10px;
            background-image: linear-gradient(135deg, #fff 50%, transparent 50%), linear-gradient(225deg, #fff 50%, transparent 50%);
            background-position: 0 0, 10px 0;
        }

        .receipt-container::after {
            bottom: -10px;
            background-image: linear-gradient(45deg, #fff 50%, transparent 50%), linear-gradient(-45deg, #fff 50%, transparent 50%);
            background-position: 0 0, 10px 0;
        }

        .header {
            text-align: center;
            border-bottom: 2px dashed #cbd5e1;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .logo {
            width: 120px;
            margin-bottom: -15px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            margin: 0;
            color: #ea580c;
            /* Orange matching logo */
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .header p {
            font-family: 'Courier Prime', monospace;
            color: #64748b;
            margin: 5px 0 0 0;
            font-size: 14px;
        }

        .amount-box {
            background: #fff7ed;
            /* Orange tint fade */
            border: 2px solid #fdba74;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
        }

        .amount-box p {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            color: #ea580c;
            text-transform: uppercase;
        }

        .amount-box h2 {
            margin: 5px 0 0 0;
            font-size: 42px;
            font-weight: 900;
            color: #ea580c;
            letter-spacing: -1px;
        }

        .details {
            font-family: 'Courier Prime', monospace;
            font-size: 15px;
            color: #334155;
            line-height: 1.8;
            border-bottom: 2px dashed #cbd5e1;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .data-label {
            color: #94a3b8;
        }

        .data-value {
            font-weight: 700;
            text-align: right;
        }

        .status-badge {
            display: inline-block;
            background: #ea580c;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer {
            text-align: center;
        }

        .footer p {
            margin: 0;
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
        }

        .footer strong {
            color: #ea580c;
        }

        /* Watermark */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 80px;
            font-weight: 900;
            color: rgba(234, 88, 12, 0.05);
            /* Faint Orange */
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="receipt-container">
        <div class="watermark">PAID COMPLETED</div>

        <div class="content">
            <div class="header">
                <img src="{LOGO_PATH}" alt="GRupiah" class="logo" />
                <h1>Payout</h1>
                <p>TX: <span id="txId">REQ-8921-A</span></p>
                <p id="dateStr">04 Mar 2026 09:15:22</p>
            </div>

            <div class="amount-box">
                <p>Total Pencairan</p>
                <h2 id="amount">Rp 850.000</h2>
            </div>

            <div class="details">
                <div class="data-row">
                    <span class="data-label">PENERIMA:</span>
                    <span class="data-value" id="username">Budi*****</span>
                </div>
                <div class="data-row">
                    <span class="data-label">METODE:</span>
                    <span class="data-value" id="method">DANA E-Wallet</span>
                </div>
                <div class="data-row">
                    <span class="data-label">NO. AKUN:</span>
                    <span class="data-value" id="account">0812****8992</span>
                </div>
                <div class="data-row" style="margin-top: 15px;">
                    <span class="data-label">STATUS:</span>
                    <span class="data-value"><span class="status-badge">Berhasil ✓</span></span>
                </div>
            </div>

            <div class="footer">
                <p>Terima kasih telah bermain di <strong>GRupiah!</strong></p>
                <p style="margin-top: 5px; font-size: 11px;">Mainkan & withdraw sekarang via Telegram</p>
            </div>
        </div>
    </div>

</body>

</html>
