<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Offer GRupiah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0c0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .promo-container {
            width: 480px;
            height: 620px;
            background: linear-gradient(160deg, #FF5A00 0%, #E11C1C 50%, #B91C1C 100%);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        /* Decorative elements */
        .deco-circle-1 {
            position: absolute;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(255, 209, 0, 0.15) 0%, transparent 70%);
            top: -80px;
            right: -60px;
            border-radius: 50%;
        }

        .deco-circle-2 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            bottom: -40px;
            left: -60px;
            border-radius: 50%;
        }

        .deco-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 60px,
                    rgba(255, 255, 255, 0.02) 60px,
                    rgba(255, 255, 255, 0.02) 61px);
        }

        .content {
            position: relative;
            z-index: 2;
        }

        /* Logo */
        .logo-area {
            margin-bottom: 8px;
        }

        .logo-area img {
            width: 70px;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #FFD100, #FBBF24);
            color: #7C2D12;
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(255, 209, 0, 0.4);
            margin-bottom: 16px;
        }

        /* Title */
        .title {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            line-height: 1.1;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        /* Amount card */
        .amount-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            transform: rotate(-1deg);
        }

        .amount-subtitle {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .amount-value {
            font-size: 44px;
            font-weight: 900;
            color: #FF5A00;
            letter-spacing: -2px;
        }

        /* Info rows */
        .info-section {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
        }

        .info-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        .info-value {
            font-size: 13px;
            color: #fff;
            font-weight: 700;
        }

        .info-urgent {
            color: #FDE68A;
            font-weight: 800;
        }

        /* Footer */
        .footer-text {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>
    <div class="promo-container">
        <div class="deco-circle-1"></div>
        <div class="deco-circle-2"></div>
        <div class="deco-line"></div>

        <div class="content">
            <div class="logo-area">
                <img src="{LOGO_PATH}" alt="GRupiah" />
            </div>

            <div class="badge">🔥 HOT OFFER</div>

            <h1 class="title" id="title">APP INSTALL<br />REWARD!!!</h1>

            <div class="amount-card">
                <div class="amount-subtitle">Bayaran Instan</div>
                <div class="amount-value" id="amount">Rp 55.000</div>
            </div>

            <div class="info-section">
                <div class="info-row">
                    <span class="info-label">Nama Offer</span>
                    <span class="info-value" id="username">Play & Win</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Tipe</span>
                    <span class="info-value" id="method">CPA Premium</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Kuota Sisa</span>
                    <span class="info-value info-urgent">🔥 <span id="quota">12</span> Slot Terakhir</span>
                </div>
            </div>

            <div class="footer-text">Mainkan sekarang di @GRupiahBot 🚀</div>
        </div>
    </div>
</body>

</html>
