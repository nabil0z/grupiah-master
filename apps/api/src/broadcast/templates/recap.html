<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Recap GRupiah</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .recap-container {
            width: 480px;
            height: 600px;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            border: 2px solid #334155;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            margin-bottom: 30px;
            z-index: 2;
        }

        .header img {
            width: 120px;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #ea580c;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 16px;
            color: #94a3b8;
            margin: 5px 0 0 0;
            letter-spacing: 1px;
        }

        .main-stat {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            z-index: 2;
        }

        .main-stat p {
            margin: 0;
            font-size: 14px;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-stat h2 {
            margin: 10px 0 0 0;
            font-size: 52px;
            font-weight: 700;
            color: #ea580c;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            z-index: 2;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 15px;
        }

        .stat-box .label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .stat-box .trend {
            font-size: 12px;
            color: #fc5c24;
            margin-top: 5px;
        }

        /* Abstract Background Lines */
        .lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
            opacity: 0.5;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #475569;
            z-index: 2;
        }
    </style>
</head>

<body>

    <div class="recap-container">
        <div class="lines"></div>

        <div class="header">
            <img src="{LOGO_PATH}" alt="GRupiah" />
            <h1>DAILY RECAP</h1>
            <p id="dateStr">Rabu, 04 Mar 2026</p>
        </div>

        <div class="main-stat">
            <p>Total Penarikan Hari Ini</p>
            <h2 id="amount">Rp 15.420.000</h2>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="label">Tugas Selesai</div>
                <div class="value" id="tasksCompleted">8,492</div>
                <div class="trend">▲ 12% dari kemarin</div>
            </div>
            <div class="stat-box">
                <div class="label">Pencairan Sukses</div>
                <div class="value" id="wdCompleted">342</div>
                <div class="trend">▲ 5% dari kemarin</div>
            </div>
        </div>

        <div class="footer">
            Data realtime dari sistem GRupiah
        </div>
    </div>

</body>

</html>
