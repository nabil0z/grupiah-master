<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Recap GRupiah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #060810;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .recap-container {
            width: 480px;
            background: linear-gradient(180deg, #0f172a 0%, #0c1222 100%);
            border-radius: 24px;
            border: 1px solid rgba(255, 90, 0, 0.15);
            padding: 36px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 90, 0, 0.08), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Grid background */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(255, 90, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 90, 0, 0.03) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 1;
        }

        /* Top glow */
        .top-glow {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 90, 0, 0.12) 0%, transparent 70%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            margin-bottom: 28px;
        }

        .header img {
            width: 70px;
            border-radius: 50%;
            margin-bottom: 12px;
            box-shadow: 0 0 24px rgba(255, 90, 0, 0.3);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 900;
            color: #FF5A00;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .header .date {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Main stat */
        .main-stat {
            background: rgba(255, 90, 0, 0.06);
            border: 1px solid rgba(255, 90, 0, 0.12);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 24px;
        }

        .main-stat-label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .main-stat-value {
            font-size: 40px;
            font-weight: 900;
            color: #FF5A00;
            letter-spacing: -1px;
            line-height: 1;
            text-shadow: 0 0 40px rgba(255, 90, 0, 0.3);
        }

        .main-stat-sub {
            font-size: 12px;
            color: #10B981;
            font-weight: 700;
            margin-top: 8px;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 18px 16px;
            text-align: center;
        }

        .stat-card-label {
            font-size: 10px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: 900;
            color: #f1f5f9;
            line-height: 1;
        }

        .stat-card-trend {
            font-size: 11px;
            color: #10B981;
            font-weight: 600;
            margin-top: 6px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 90, 0, 0.2), transparent);
            margin-bottom: 18px;
        }

        /* Footer */
        .footer {
            font-size: 11px;
            color: #334155;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .footer span {
            color: #FF5A00;
        }
    </style>
</head>

<body>
    <div class="recap-container">
        <div class="grid-bg"></div>
        <div class="top-glow"></div>

        <div class="content">
            <div class="header">
                <img src="{LOGO_PATH}" alt="GRupiah" />
                <h1>Daily Recap</h1>
                <div class="date" id="dateStr">Kamis, 06 Mar 2026</div>
            </div>

            <div class="main-stat">
                <div class="main-stat-label">Total Penarikan Hari Ini</div>
                <div class="main-stat-value" id="amount">Rp 245.600.000</div>
                <div class="main-stat-sub">📈 Semua berhasil dicairkan</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-card-label">Tugas Selesai</div>
                    <div class="stat-card-value" id="tasksCompleted">8.492</div>
                    <div class="stat-card-trend">▲ 12% dari kemarin</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-label">Pencairan Sukses</div>
                    <div class="stat-card-value" id="wdCompleted">342</div>
                    <div class="stat-card-trend">▲ 5% dari kemarin</div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="footer">
                Data realtime dari <span>GRupiah</span> • @GRupiahBot
            </div>
        </div>
    </div>
</body>

</html>
