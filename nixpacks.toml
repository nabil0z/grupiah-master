[phases.install]
cmds = ["npm install", "npm install -g prisma turbo"]

[phases.build]
cmds = [
  "prisma generate --schema=./packages/database/prisma/schema.prisma",
  "turbo run build --filter=api",
  "npm prune --production"
]

[start]
cmd = "prisma db push --accept-data-loss --schema=./packages/database/prisma/schema.prisma && node apps/api/dist/main.js"
