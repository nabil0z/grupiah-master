[phases.install]
cmds = ["npm install", "npm install -g prisma@5 turbo@2"]

[phases.build]
cmds = [
  "turbo run build --filter=grupiah-api"
]

[start]
cmd = "./node_modules/.bin/prisma generate --schema=./packages/database/prisma/schema.prisma && ./node_modules/.bin/prisma db push --accept-data-loss --schema=./packages/database/prisma/schema.prisma && node apps/api/dist/main.js"
