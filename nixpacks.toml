[phases.install]
cmds = ["npm install", "npm install -g prisma@5 turbo@2"]

[phases.build]
cmds = [
  "turbo run build --filter=grupiah-api"
]

[start]
cmd = "npx prisma@5 generate --schema=./packages/database/prisma/schema.prisma && npx prisma@5 db push --accept-data-loss --schema=./packages/database/prisma/schema.prisma && node apps/api/dist/main.js"
